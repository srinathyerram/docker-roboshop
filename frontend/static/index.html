<!DOCTYPE html>
<html lang="en">
<head>
    <!--# include file="eum.html" -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stan's Robot Shop</title>
    <link rel="shortcut icon" type="image/png" href="/media/instana_icon_square.png"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>

    <header class="app-header">
        <div class="brand-section">
            <span id="stan">
                <a href="/"><img src="/media/stan.png" alt="Stan"></a>
            </span>
            <h1><a href="/">Stan's Robot Shop</a></h1>
        </div>

        <div class="search-section">
            <form id="search-form" autocomplete="off">
                <input type="text" id="search-input" placeholder="Search robot companions..." required>
                <button type="submit">Search</button>
            </form>
        </div>

        <div class="header-actions">
            <a href="/login" class="action-btn" id="login-btn">👤 Login</a>
            <a href="/cart" class="action-btn" id="cart-btn">🛒 Cart <span class="badge">Empty</span></a>
        </div>
    </header>

    <div class="app-container">
        <div class="main-layout">
            <!-- Sidebar Navigation -->
            <aside class="sidebar glass-panel" id="sidebar-nav">
                <!-- Dynamically populated categories -->
                <h3>Navigation</h3>
                <ul class="category-list">
                    <li class="category-item">
                        <div class="category-header">Loading...</div>
                    </li>
                </ul>
            </aside>

            <!-- Dynamic Content View Area -->
            <main class="content-area" id="view">
                <!-- Dynamically populated page template by router -->
                <div style="text-align: center; padding: 100px 0;">
                    <h2>Initializing robotic store components...</h2>
                </div>
            </main>
        </div>

        <!-- Footer -->
        <footer class="app-footer">
            <div>
                &copy; 2026 Stan's Robot Shop. Designed for full observability.
            </div>
            <div id="footer-uniqueid">
                Session ID: loading...
            </div>
        </footer>
    </div>

    <!-- JavaScript Application Entry -->
    <script src="/js/app.js"></script>

</body>
</html>
